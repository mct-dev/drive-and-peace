name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Ensure GitHub Pages is enabled
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          gh api "repos/${{ github.repository }}/pages" >/dev/null 2>&1
          if [ $? -eq 0 ]; then
            echo "Pages already enabled"
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Attempting to enable GitHub Pages (workflow source)…"
          gh api "repos/${{ github.repository }}/pages" -X POST -f build_type=workflow
          if [ $? -eq 0 ]; then
            echo "Pages enabled via API"
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::GitHub Pages is not enabled for this repository."
          echo "::error::Open https://github.com/${{ github.repository }}/settings/pages"
          echo "::error::Set Source to GitHub Actions, then re-run this workflow."
          echo "enabled=false" >> "$GITHUB_OUTPUT"
          exit 1

      - uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify production site
        env:
          PRODUCTION_URL: https://mct-dev.github.io/drive-and-peace/
          VERIFY_ATTEMPTS: 30
          VERIFY_DELAY_MS: 10000
        run: node scripts/verify-production.mjs
